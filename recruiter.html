<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà tuyển dụng - EchoWork</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/recruiter.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="container header-inner">
            <a href="index.html" class="logo" aria-label="EchoWork">
                <img src="images/echo-work-logo.svg" alt="EchoWork logo">
            </a>
            <nav class="nav">
                <a href="#">Dashboard</a>
                <a href="#">Tin tuyển dụng</a>
                <a href="#">Ứng viên</a>
            </nav>
            <div class="auth-btns">
                <a href="#" class="btn btn-primary">+ Đăng tin mới</a>
            </div>
        </div>
    </header>

    <section class="recruiter-hero">
        <div class="container">
            <div class="dash-header">
                <div>
                    <h1>Chào buổi sáng, TechVina!</h1>
                    <p>Hôm nay bạn có 15 ứng viên mới đang chờ duyệt.</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num">12</div>
                    <div class="stat-label">Tin đang đăng</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="font-size: 32px; font-weight: 800; color: var(--primary);">458</div>
                    <div class="stat-label">Tổng ứng viên</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num">85%</div>
                    <div class="stat-label">Tỷ lệ phản hồi</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num">24</div>
                    <div class="stat-label">Lượt xem hôm nay</div>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
